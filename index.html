<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Habit Flow - приложение для отслеживания привычек, целей и визуализации прогресса."
    />
    <title>Habit Flow</title>
  </head>
  <body>
    <div id="root">
      <main
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          padding: 24px;
          background: #f4f1ea;
          color: #171b22;
          font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        "
      >
        <section
          style="
            max-width: 560px;
            padding: 28px;
            background: #fffdf8;
            border: 1px solid #e3ded2;
            border-radius: 8px;
            box-shadow: 0 22px 60px rgba(45, 37, 22, 0.12);
          "
        >
          <h1 style="margin: 0 0 12px; font-size: 32px">Habit Flow</h1>
          <p style="margin: 0; color: #6b7280; line-height: 1.55">
            Приложение загружается. Если вы открыли index.html напрямую, запустите проект командой
            <strong>npm run dev</strong> и откройте <strong>http://127.0.0.1:5173/</strong>.
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
